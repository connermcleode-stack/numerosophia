<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerosophia</title>
    <!-- Importazione dei font eleganti da Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=500;700&family=Cormorant+Garamond:ital,wght=0,400;0,600;1,400&family=Montserrat:wght=300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0a08;
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa7c11;
            --card-bg: rgba(25, 23, 20, 0.6);
            --card-border: rgba(212, 175, 55, 0.25);
            --text-muted: #a39e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 12px 16px;
            overflow: hidden; 
            position: relative;
        }

        /* Sfondo mistico con polvere di stelle e nebulosa dorata */
        body::before {
            content: '';
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 140vw;
            height: 600px;
            background: 
                radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.12) 0%, rgba(170, 124, 17, 0.04) 35%, transparent 70%),
                radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px) 0 0 / 40px 40px,
                radial-gradient(rgba(255, 255, 255, 0.1) 1.5px, transparent 1.5px) 20px 20px / 60px 60px;
            opacity: 0.75;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 360px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* Logo e testata ottimizzati */
        .header-logo {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Contenitore per isolare l'effetto di sfondo della geometria sacra */
        .sacred-geometry-wrapper {
            position: relative;
            width: clamp(140px, 28vh, 180px);
            height: clamp(140px, 28vh, 180px);
            margin-bottom: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sacred-triangle {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 6.5vw, 1.8rem);
            letter-spacing: clamp(2px, 1vw, 3px);
            color: var(--gold-primary);
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .gold-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 6px 0;
            width: 100%;
        }

        .gold-divider::before, .gold-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to var(--direction, right), transparent, var(--gold-dark));
            max-width: 50px;
        }
        .gold-divider::before { --direction: right; }
        .gold-divider::after { --direction: left; }

        .gold-divider svg {
            width: 8px;
            height: 8px;
            fill: var(--gold-primary);
            margin: 0 6px;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            color: #e0dbd1;
            line-height: 1.2;
            max-width: 90%;
            margin: 0 auto;
        }

        /* Intestazione di sezione */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: #f5f1e9;
            margin: 14px 0 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            width: 100%;
        }

        .section-title::before, .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            align-self: center;
        }

        .section-title::before {
            background: linear-gradient(to left, var(--gold-dark) 40%, transparent 100%);
            margin-right: 10px;
        }

        .section-title::after {
            background: linear-gradient(to right, var(--gold-dark) 40%, transparent 100%);
            margin-left: 10px;
        }

        .section-title span {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span::before, .section-title span::after {
            content: '';
            width: 5px;
            height: 5px;
            border: 1px solid var(--gold-primary);
            transform: rotate(45deg);
            display: inline-block;
            flex-shrink: 0;
        }

        /* Pulsanti (quadranti) compatti */
        .menu-button {
            display: flex;
            align-items: center;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: clamp(9px, 2.5vw, 11px) clamp(12px, 3.5vw, 16px);
            margin-bottom: 7px;
            cursor: pointer;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 3px 8px rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            text-align: left;
        }

        .menu-button:hover {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.12);
            transform: translateY(-1px);
        }

        .icon-container {
            width: clamp(36px, 9vw, 40px);
            height: clamp(36px, 9vw, 40px);
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: clamp(10px, 3.5vw, 14px);
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .icon-container svg {
            width: 60%;
            height: 60%;
            fill: none;
            stroke: var(--gold-primary);
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .button-text {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .button-category {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .button-main-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.9rem, 3.8vw, 1rem);
            letter-spacing: 1px;
            color: var(--gold-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .arrow-right {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: var(--gold-dark);
            stroke-width: 2;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .menu-button:hover .arrow-right {
            stroke: var(--gold-primary);
            transform: translateX(2px);
        }

        /* Footer compatto */
        footer {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .footer-dots span {
            width: 3px;
            height: 3px;
            background-color: var(--gold-dark);
            border-radius: 50%;
            opacity: 0.3;
        }

        .footer-dots span.center-star {
            width: 7px;
            height: 7px;
            background: var(--gold-primary);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.8;
        }

        .version {
            font-size: 0.55rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Intestazione con logo, Geometria Sacra ed effetto Luce Superiore Mobile-Ready -->
        <div class="header-logo">
            <div class="sacred-geometry-wrapper">
                <svg class="sacred-triangle" viewBox="0 0 100 100">
                    <defs>
                        <!-- Gradiente per un alone morbido dorato di sfondo -->
                        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#aa7c11" stop-opacity="0.5" />
                            <stop offset="60%" stop-color="#0b0a08" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#0b0a08" stop-opacity="0" />
                        </radialGradient>

                        <!-- Gradiente ad opacità nativa super compatibile per la luce in alto -->
                        <radialGradient id="top-flare" cx="50%" cy="20%" r="35%">
                            <stop offset="0%" stop-color="rgba(255, 245, 204, 0.85)" />
                            <stop offset="30%" stop-color="rgba(214, 175, 87, 0.5)" />
                            <stop offset="70%" stop-color="rgba(170, 124, 17, 0.15)" />
                            <stop offset="100%" stop-color="rgba(11, 10, 8, 0)" />
                        </radialGradient>
                    </defs>

                    <!-- Alone centrale di fondo per dare profondità -->
                    <circle cx="50" cy="50" r="48" fill="url(#glow)" />

                    <!-- GEOMETRIA SACRA DI SFONDO (Sottile ed Esoterica) -->
                    <g stroke="#aa7c11" stroke-width="0.25" fill="none" opacity="0.35">
                        <circle cx="50" cy="22" r="28" />
                        <circle cx="50" cy="78" r="28" />
                        <circle cx="22" cy="50" r="28" />
                        <circle cx="78" cy="50" r="28" />
                        
                        <circle cx="31" cy="31" r="22" />
                        <circle cx="69" cy="31" r="22" />
                        <circle cx="31" cy="69" r="22" />
                        <circle cx="69" cy="69" r="22" />
                        
                        <line x1="50" y1="2" x2="50" y2="98" stroke-dasharray="1 3" />
                        <line x1="2" y1="50" x2="98" y2="50" stroke-dasharray="1 3" />
                        <line x1="16" y1="16" x2="84" y2="84" stroke-width="0.15" />
                        <line x1="16" y1="84" x2="84" y2="16" stroke-width="0.15" />

                        <polygon points="50,15 60,40 85,50 60,60 50,85 40,60 15,50 40,40" stroke-width="0.2" />
                    </g>
                    
                    <!-- PRIMO PIANO: Il cerchio doppio e lo sfondo scuro solido antierrore mobile -->
                    <circle cx="50" cy="50" r="26" fill="#0b0a08" stroke="#d4af37" stroke-width="1.2" />
                    <circle cx="50" cy="50" r="23.5" stroke="#d4af37" stroke-width="0.5" fill="none" stroke-dasharray="0.8 1.5"/>
                    
                    <!-- EFFETTO LUCE IN ALTO COMPATIBILE (Senza mix-blend-mode problematici) -->
                    <ellipse cx="50" cy="24" rx="14" ry="4" fill="url(#top-flare)" />
                    <circle cx="50" cy="24" r="1" fill="#ffffff" opacity="0.6" />

                    <!-- Triangolo proporzionato internamente -->
                    <polygon points="50,35 36,59 64,59" stroke="#d4af37" stroke-width="1.2" fill="none"/>
                    
                    <!-- Numeri perfettamente visibili con ombra netta protettiva -->
                    <text x="50" y="31.5" fill="#f3e5ab" font-family="Cinzel" font-size="6" font-weight="bold" text-anchor="middle" style="text-shadow: 0px 1px 2px #0b0a08, 0px 0px 2px #0b0a08;">7</text>
                    <text x="31" y="62" fill="#f3e5ab" font-family="Cinzel" font-size="6" font-weight="bold" text-anchor="middle">4</text>
                    <text x="69" y="62" fill="#f3e5ab" font-family="Cinzel" font-size="6" font-weight="bold" text-anchor="middle">3</text>
                    <text x="50" y="52" fill="#f3e5ab" font-family="Cinzel" font-size="8.5" text-anchor="middle" font-weight="bold">5</text>
                </svg>
            </div>

            <h1>NUMEROSOPHIA</h1>
            
            <div class="gold-divider">
                <svg viewBox="0 0 10 10"><polygon points="5,0 10,5 5,10 0,5"/></svg>
            </div>
            
            <p class="subtitle">Ogni numero racconta una parte di te.</p>
        </div>

        <!-- Sezione Metodi -->
        <div class="section-title">
            <span>Scegli il metodo</span>
        </div>

        <!-- Numerologia Pitagorica -->
        <a href="pitagora.html" class="menu-button">
            <div class="icon-container">
                <svg viewBox="0 0 24 24">
                    <polygon points="12,4.5 5,18.5 19,18.5" />
                    <line x1="8.5" y1="11.5" x2="15.5" y2="11.5" />
                    <line x1="8.5" y1="11.5" x2="12" y2="18.5" />
                    <line x1="15.5" y1="11.5" x2="12" y2="18.5" />
                    <circle cx="12" cy="4.5" r="1.6" fill="var(--gold-primary)" stroke="#0b0a08" stroke-width="0.6"/>
                    <circle cx="8.5" cy="11.5" r="1.6" fill="var(--gold-primary)" stroke="#0b0a08" stroke-width="0.6"/>
                    <circle cx="15.5" cy="11.5" r="1.6" fill="var(--gold-primary)" stroke="#0b0a08" stroke-width="0.6"/>
                    <circle cx="5" cy="18.5" r="1.6" fill="var(--gold-primary)" stroke="#0b0a08" stroke-width="0.6"/>
                    <circle cx="12" cy="18.5" r="1.6" fill="var(--gold-primary)" stroke="#0b0a08" stroke-width="0.6"/>
                    <circle cx="19" cy="18.5" r="1.6" fill="var(--gold-primary)" stroke="#0b0a08" stroke-width="0.6"/>
                </svg>
            </div>
            <div class="button-text">
                <span class="button-category">Numerologia</span>
                <span class="button-main-title">Pitagorica</span>
            </div>
            <svg class="arrow-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </a>

        <!-- Numerologia Caldea -->
        <a href="caldea.html" class="menu-button">
            <div class="icon-container">
                <svg viewBox="0 0 24 24">
                    <path d="M 12.00,3.50 L 20.50,12.00 L 12.00,20.50 L 3.50,12.00 Z" />
                    <path d="M 18.01,5.99 L 18.01,18.01 L 5.99,18.01 L 5.99,5.99 Z" />
                </svg>
            </div>
            <div class="button-text">
                <span class="button-category">Numerologia</span>
                <span class="button-main-title">Caldea</span>
            </div>
            <svg class="arrow-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </a>

        <!-- Affinità e Compatibilità -->
        <a href="compatibilita.html" class="menu-button">
            <div class="icon-container">
                <svg viewBox="0 0 24 24" style="fill: none; stroke: var(--gold-primary); stroke-width: 1.2;">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    <path d="M12 7c.5-1 1.5-2 3-2 2 0 3.5 1.5 3.5 3.5 0 2-2 4-5.5 7" opacity="0.6" stroke-dasharray="1 1"/>
                </svg>
            </div>
            <div class="button-text">
                <span class="button-category">Affinità e</span>
                <span class="button-main-title">Compatibilità</span>
            </div>
            <svg class="arrow-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </a>

        <!-- Sezione Consulti -->
        <div class="section-title">
            <span>I tuoi consulti</span>
        </div>

        <!-- Archivio -->
        <a href="archivio.html" class="menu-button">
            <div class="icon-container">
                <svg viewBox="0 0 24 24" style="fill: none; stroke: var(--gold-primary);">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke-width="1.5"/>
                </svg>
            </div>
            <div class="button-text">
                <span class="button-main-title">Archivio</span>
                <span class="button-category" style="text-transform: none; font-size: 0.65rem;">I miei consulti</span>
            </div>
            <svg class="arrow-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </a>

        <!-- Footer dell'applicazione -->
        <footer>
            <div class="gold-divider" style="margin: 0;">
                <svg viewBox="0 0 10 10"><polygon points="5,0 10,5 5,10 0,5"/></svg>
            </div>
            <div class="footer-dots">
                <span></span>
                <span></span>
                <span class="center-star"></span>
                <span></span>
                <span></span>
            </div>
            <div class="version">Versione 1.0</div>
        </footer>

    </div>

</body>
</html>
