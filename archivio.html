<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numerosophia - Archivio Profili</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8e7355">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #0b0a08; 
            color: #e0dbd1; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 60%),
                radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px) 0 0 / 40px 40px,
                radial-gradient(rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px) 20px 20px / 60px 60px;
            opacity: 0.6;
            pointer-events: none;
            z-index: -1;
        }

        .container { 
            background: rgba(25, 23, 20, 0.96); 
            padding: 25px 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 850px; 
            width: 100%; 
            border: 1px solid rgba(142, 115, 85, 0.3); 
        }

        h1 { 
            text-align: center; 
            color: #d4af37; 
            font-family: 'Cinzel', serif; 
            font-size: 22px; 
            margin-top: 5px;
            margin-bottom: 20px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.3); 
        }

        .btn-home { 
            background: #2a2724; 
            color: #c4beb3; 
            border: 1px solid rgba(142, 115, 85, 0.2); 
            margin-bottom: 15px; 
            text-decoration: none; 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 13px; 
            align-self: flex-start;
            transition: background 0.2s, color 0.2s;
        }
        .btn-home:hover { 
            background: #36322e; 
            color: #f5f2eb; 
        }
        
        /* Layout fluido per barra di ricerca e controlli */
        .actions-bar { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 15px; 
            width: 100%; 
        }

        .search-row {
            display: flex;
            width: 100%;
            gap: 8px;
        }
        
        .search-input { 
            flex-grow: 1; 
            padding: 10px 12px; 
            border: 1px solid rgba(142, 115, 85, 0.3); 
            border-radius: 6px; 
            font-size: 14px; 
            background-color: #1a1816; 
            color: #f5f2eb; 
            font-family: inherit;
            transition: border-color 0.2s, background-color 0.2s; 
        }
        .search-input:focus { 
            border-color: #d4af37; 
            outline: none; 
            background-color: #221f1c;
        }

        /* Pulsanti d'azione superiori */
        .btn-action-container { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            width: 100%;
            justify-content: space-between;
        }
        
        /* Stile pulsanti compattati */
        .btn { 
            display: inline-flex; 
            padding: 10px 14px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            white-space: nowrap; 
            align-items: center; 
            justify-content: center; 
            gap: 4px; 
            transition: background 0.2s, transform 0.1s; 
            font-family: inherit; 
            color: white;
            flex: 1; /* Distribuisce equamente lo spazio */
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-export { background-color: #1e4620; border: 1px solid rgba(46, 125, 50, 0.4); }
        .btn-export:hover { background-color: #2e5c31; }
        
        .btn-import { background-color: #1a3a5c; border: 1px solid rgba(21, 101, 192, 0.4); }
        .btn-import:hover { background-color: #254f7d; }
        
        /* Tasti Iconici Compatti */
        .btn-icon-top { 
            width: 38px; 
            height: 38px; 
            padding: 0; 
            border-radius: 6px; 
            font-size: 16px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border: 1px solid rgba(142, 115, 85, 0.2); 
            background-color: #2a2724;
            transition: background-color 0.2s; 
            flex-shrink: 0;
        }
        .btn-select-mode:hover { background-color: #36322e; }
        
        /* Selezione attiva */
        .btn-select-active { 
            background-color: transparent !important; 
            color: #d4af37 !important; 
            border: 1px solid #d4af37 !important; 
            font-size: 14px; 
            font-weight: bold; 
        }
        
        /* Cestino di massa */
        .btn-delete-all { background-color: #5c1d1d; border: 1px solid rgba(198, 40, 40, 0.4); display: none; }
        .btn-delete-all:hover { background-color: #7d2828; }

        /* Contenitore tabella responsiva scura */
        .table-responsive { 
            width: 100%; 
            overflow-x: auto; 
            overflow-y: auto;
            max-height: 60vh; 
            -webkit-overflow-scrolling: touch; 
            border-radius: 8px; 
            border: 1px solid rgba(142, 115, 85, 0.3); 
            margin-top: 5px;
            background: #1f1d1a;
        }
        
        /* Scrollbar stilizzate */
        .table-responsive::-webkit-scrollbar { height: 6px; width: 6px; }
        .table-responsive::-webkit-scrollbar-thumb { background-color: #544738; border-radius: 3px; }
        .table-responsive::-webkit-scrollbar-track { background: #151412; }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid rgba(142, 115, 85, 0.15); white-space: nowrap; }
        
        th { 
            background-color: #151412; 
            color: #d4af37; 
            font-family: 'Cinzel', serif;
            font-size: 11px; 
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid rgba(142, 115, 85, 0.3);
        }
        td { font-size: 13px; color: #e8e3d9; }
        tr:hover td { background-color: rgba(142, 115, 85, 0.05); }
        
        /* Colonna selezione */
        .col-select { display: none; width: 35px; text-align: center; }
        .checkbox-importante { 
            transform: scale(1.1); 
            cursor: pointer; 
            accent-color: #d4af37;
        }

        /* Bottone Apri Profilo */
        .btn-open { 
            background: #8e7355; 
            color: white; 
            display: inline-flex; 
            width: 32px; 
            height: 32px; 
            padding: 0; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px; 
            font-size: 14px; 
            text-decoration: none; 
            transition: background 0.2s;
            border: none;
        }
        .btn-open:hover { background: #765f45; }
        
        /* Badges Metodi */
        .metodo-badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-pitagora { background-color: rgba(46, 125, 50, 0.2); color: #a3cfab; border: 1px solid rgba(46, 125, 50, 0.4); }
        .badge-caldea { background-color: rgba(123, 31, 162, 0.2); color: #e1bee7; border: 1px solid rgba(123, 31, 162, 0.4); }

        /* Media Query specifica per Smartphone */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .container { padding: 15px 10px; border-radius: 8px; }
            .btn-home { align-self: stretch; text-align: center; display: block; margin-bottom: 10px; }
            h1 { font-size: 18px; margin-bottom: 15px; }
            
            /* Ottimizzazione testi bottoni per non farli tagliare */
            .btn-export span::after { content: ""; }
            .btn-import span::after { content: ""; }
            
            .btn { padding: 10px 8px; font-size: 12px; }
            .btn-icon-top { width: 38px; height: 38px; }
            
            th, td { padding: 8px 6px; }
            td { font-size: 12px; }
            th { font-size: 10px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home">← Torna alla Home</a>

    <div class="container">
        <h1>📁 Archivio Profili</h1>
        
        <div class="actions-bar">
            <!-- Riga superiore con Cerca + Selezione + Cestino -->
            <div class="search-row">
                <input type="text" id="inputRicerca" onkeyup="filtraClienti()" placeholder="🔍 Cerca per Cognome o Nome..." class="search-input">
                <button onclick="toggleModalitaSelezione()" id="btnSelezione" class="btn-icon-top btn-select-mode" title="Attiva Selezione Multipla">☑️</button>
                <button onclick="eliminaSelezionati()" id="btnEliminaMassa" class="btn-icon-top btn-delete-all" title="Elimina Profili Selezionati">🗑️</button>
            </div>
            
            <!-- Riga inferiore con Esporta ed Importa distribuiti uniformemente -->
            <div class="btn-action-container">
                <button onclick="esportaInExcel()" class="btn btn-export">🟢 <span>Esporta</span></button>
                <input type="file" id="fileImport" accept=".csv, text/csv, text/comma-separated-values, application/csv, application/vnd.ms-excel" style="display: none;" onchange="importaDaExcel(this)">
                <button onclick="document.getElementById('fileImport').click()" class="btn btn-import">🔵 <span>Importa</span></button>
            </div>
        </div>

        <div class="table-responsive">
            <table id="tabellaClienti">
                <thead>
                    <tr>
                        <th class="col-select" id="th-select"><input type="checkbox" id="selectAll" onclick="selezionaTuttiCheckbox(this)" class="checkbox-importante"></th>
                        <th>Cognome e Nome</th>
                        <th>Data di Nascita</th>
                        <th>Metodo</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="corpoTabella">
                </tbody>
            </table>
        </div>
    </div>

<script>
const DB_NAME = 'NumerologiaDB';
const DB_VERSION = 2; 
let db;
let modalitaSelezioneAttiva = false;

const request = indexedDB.open(DB_NAME, DB_VERSION);

request.onupgradeneeded = function(event) {
    const dbIniziale = event.target.result;
    if (!dbIniziale.objectStoreNames.contains('clienti')) {
        dbIniziale.createObjectStore('clienti', { keyPath: 'id', autoIncrement: true });
    }
};

request.onsuccess = function(event) {
    db = event.target.result;
    mostraClienti();
};

request.onerror = function(event) {
    console.error("Errore nell'apertura del database:", event.target.error);
};

function mostraClienti() {
    const corpoTabella = document.getElementById('corpoTabella');
    corpoTabella.innerHTML = ""; 

    const transaction = db.transaction(['clienti'], 'readonly');
    const store = transaction.objectStore('clienti');
    
    const elencoClienti = [];
    
    store.openCursor().onsuccess = function(event) {
        const cursor = event.target.result;
        if (cursor) {
            elencoClienti.push(cursor.value);
            cursor.continue();
        } else {
            if (elencoClienti.length > 0) {
                elencoClienti.sort((a, b) => {
                    let cogA = (a.cognome || "").trim().toUpperCase();
                    let cogB = (b.cognome || "").trim().toUpperCase();
                    if (cogA < cogB) return -1;
                    if (cogA > cogB) return 1;
                    
                    let nomA = (a.nome || "").trim().toUpperCase();
                    let nomB = (b.nome || "").trim().toUpperCase();
                    if (nomA < nomB) return -1;
                    if (nomA > nomB) return 1;
                    return 0;
                });

                elencoClienti.forEach(cliente => {
                    const riga = document.createElement('tr');
                    const fileDestinazione = (cliente.metodo || "").toLowerCase() === 'caldea' ? 'caldea.html' : 'pitagora.html';
                    
                    const nomeVal = cliente.nome || "";
                    const cognomeVal = cliente.cognome || "";
                    const dataVal = cliente.data_nascita || "";
                    const metodoVal = (cliente.metodo || "pitagora").toLowerCase();

                    const urlMappa = `${fileDestinazione}?nome=${encodeURIComponent(nomeVal)}&cognome=${encodeURIComponent(cognomeVal)}&data=${encodeURIComponent(dataVal)}`;

                    let nomeVisualizzato = `${cognomeVal} ${nomeVal}`.trim();
                    if (!nomeVisualizzato) {
                        nomeVisualizzato = "-";
                    }

                    const displayStile = modalitaSelezioneAttiva ? "table-cell" : "none";

                    riga.innerHTML = `
                        <td class="col-select" style="display: ${displayStile}; text-align:center;"><input type="checkbox" value="${cliente.id}" class="checkbox-cliente checkbox-importante"></td>
                        <td><strong>${nomeVisualizzato}</strong></td>
                        <td>${dataVal || "-"}</td>
                        <td><span class="metodo-badge badge-${metodoVal}">${metodoVal}</span></td>
                        <td>
                            <a href="${urlMappa}" class="btn-open" title="Apri Profilo">👁️</a>
                        </td>
                    `;
                    corpoTabella.appendChild(riga);
                });
                
                document.getElementById('th-select').style.display = modalitaSelezioneAttiva ? "table-cell" : "none";
                filtraClienti();
            } else {
                corpoTabella.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#8e7355; font-style: italic; font-size:13px;">Nessun profilo in archivio.</td></tr>`;
            }
        }
    };
}

function toggleModalitaSelezione() {
    modalitaSelezioneAttiva = !modalitaSelezioneAttiva;
    const btn = document.getElementById('btnSelezione');
    const btnMassa = document.getElementById('btnEliminaMassa');
    const thSelect = document.getElementById('th-select');
    const colRighe = document.querySelectorAll('.col-select');

    if (modalitaSelezioneAttiva) {
        btn.innerHTML = "✖"; 
        btn.classList.add('btn-select-active');
        btn.title = "Annulla Selezione";
        btnMassa.style.display = "inline-flex";
        thSelect.style.display = "table-cell";
        colRighe.forEach(td => td.style.display = "table-cell");
    } else {
        btn.innerHTML = "☑️";
        btn.classList.remove('btn-select-active');
        btn.title = "Attiva Selezione Multipla";
        btnMassa.style.display = "none";
        thSelect.style.display = "none";
        colRighe.forEach(td => td.style.display = "none");
        document.getElementById('selectAll').checked = false;
        selezionaTuttiCheckbox({ checked: false });
    }
}

function selezionaTuttiCheckbox(master) {
    const checkboxes = document.querySelectorAll('.checkbox-cliente');
    checkboxes.forEach(cb => {
        if (cb.closest('tr').style.display !== "none") {
            cb.checked = master.checked;
        }
    });
}

function GridMultipla() { 
    eliminaSelezionati();
}

function eliminaSelezionati() {
    const Grid = document.querySelectorAll('.checkbox-cliente:checked');
    if (Grid.length === 0) {
        alert("Nessun profilo selezionato da eliminare.");
        return;
    }

    if (confirm(`Sei sicuro di voler eliminare definitivamente ${Grid.length} profili?`)) {
        const transaction = db.transaction(['clienti'], 'readwrite');
        const store = transaction.objectStore('clienti');

        Grid.forEach(cb => {
            const id = parseInt(cb.value);
            store.delete(id);
        });

        transaction.oncomplete = function() {
            alert("Eliminazione multipla completata.");
            modalitaSelezioneAttiva = false;
            
            const btn = document.getElementById('btnSelezione');
            btn.innerHTML = "☑️";
            btn.classList.remove('btn-select-active');
            document.getElementById('btnEliminaMassa').style.display = "none";
            document.getElementById('selectAll').checked = false;
            mostraClienti();
        };

        transaction.onerror = function(event) {
            console.error(event.target.error);
            alert("Errore durante l'eliminazione.");
        };
    }
}

function filtraClienti() {
    const input = document.getElementById('inputRicerca');
    const filtro = input.value.toUpperCase();
    const tabella = document.getElementById('corpoTabella');
    const righe = tabella.getElementsByTagName('tr');

    for (let i = 0; i < righe.length; i++) {
        const colonnaNomeCognome = righe[i].getElementsByTagName('td')[1]; 
        if (colonnaNomeCognome) {
            const testoContenuto = colonnaNomeCognome.textContent || colonnaNomeCognome.innerText;
            if (testoContenuto.toUpperCase().indexOf(filtro) > -1) {
                righe[i].style.display = ""; 
            } else {
                righe[i].style.display = "none"; 
                const cb = righe[i].querySelector('.checkbox-cliente');
                if (cb) cb.checked = false;
            }
        }
    }
}

const HEADERS_CSV = [
    "Cognome", "Nome", "Data di Nascita", "Metodo", "Data Salvataggio",
    "P_Anima", "P_Persona", "P_Io", "P_GiornoNascita", "P_Destino", "P_AnnoPersonale", "P_GiornoPersonale",
    "P_GrandiCicliEvolutivi", "P_CicliRealizzazione", "P_Ombre", "P_Quintessenza",
    "C_Anima", "C_Persona", "C_Espressione", "C_NumeroPsichico", "C_CamminoVita", 
    "C_CicloAnnualeCorrente", "C_VibrazioneGiornaliera", "C_AfflizioniPlanetarie"
];

function esportaInExcel() {
    if (!db) return;
    const transaction = db.transaction(['clienti'], 'readonly');
    const store = transaction.objectStore('clienti');
    const elencoClienti = [];
    store.openCursor().onsuccess = function(event) {
        const cursor = event.target.result;
        if (cursor) {
            elencoClienti.push(cursor.value);
            cursor.continue();
        } else {
            if (elencoClienti.length === 0) { alert("Non ci sono profili da esportare."); return; }
            let csvContent = HEADERS_CSV.join(";") + "\n";
            const pulisciDato = (valore) => {
                if (valore === undefined || valore === null) return "";
                if (typeof valore === 'object') return JSON.stringify(valore).replace(/;/g, ",").replace(/"/g, "'");
                let stringa = String(valore).replace(/;/g, ",").replace(/\r?\n|\r/g, " ").trim();
                if (stringa === "Formativo: | Produttivo: | Conclusivo:" || stringa === "1°: | 2°: | 3°: | 4°:" || stringa === "Giovinezza: | Maturità: | Principale:" || stringa === "Giovinezza:  | Maturità:  | Principale ") return "";
                return stringa;
            };
            elencoClienti.forEach(cliente => {
                let rigaDati = [];
                let isPitagora = (cliente.metodo || "").toLowerCase() === "pitagora" || (cliente.metodo || "") === "";
                rigaDati.push(pulisciDato(cliente.cognome));
                rigaDati.push(pulisciDato(cliente.nome));
                rigaDati.push(pulisciDato(cliente.data_nascita));
                rigaDati.push(pulisciDato(cliente.metodo ? cliente.metodo.toLowerCase() : "pitagora"));
                rigaDati.push(cliente.data_salvataggio ? cliente.data_salvataggio.substring(0, 10) : new Date().toISOString().substring(0,10));
                rigaDati.push(isPitagora ? pulisciDato(cliente.anima) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.persona) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.io) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.giorno_nascita || cliente.giornoNascita) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.destino) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.anno_personale || cliente.annoPersonale) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.giorno_personale || cliente.giornoPersonale) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.grandi_cicli || cliente.grandiCicli) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.cicli_realizzazione || cliente.cicliRealizzazione) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.ombre) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.quintessenza) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.anima) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.persona) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.espressione) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.numero_psichico || cliente.numeroPsichico) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.cammino_vita || cliente.camminoVita) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.ciclo_annuale || cliente.cicloAnnuale) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.vibrazione_giornaliera || cliente.vibrazioneGiornaliera) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.afflizioni || cliente.afflizioniPlanetarie) : "");
                csvContent += rigaDati.join(";") + "\n";
            });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Archivio_Completo_Numerosophia.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    };
}

function importaDaExcel(input) {
    if (!db) return;
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        const linee = text.replace(/\r\n|\r/g, "\n").split("\n");
        if (linee.length <= 1 || !linee[0].trim()) { alert("File non valido."); return; }
        
        const primaLinea = linee[0].replace(/^\uFEFF/, "").replace(/"/g, "").trim();
        const intestazioniRilevate = primaLinea.split(";").map(h => h.trim().toLowerCase());
        
        const indiceCognome = intestazioniRilevate.findIndex(h => h.includes("cognome"));
        const indiceNome = intestazioniRilevate.findIndex(h => h === "nome" || (h.includes("nome") && !h.includes("cognome")));
        
        if (indiceCognome === -1 && indiceNome === -1) { 
            alert("Formato file non riconosciuto."); 
            return; 
        }
        
        const mappaIndici = {};
        HEADERS_CSV.forEach(header => {
            let index;
            if (header.toLowerCase() === "nome") {
                index = intestazioniRilevate.findIndex(h => h === "nome" || (h.includes("nome") && !h.includes("cognome")));
            } else {
                index = intestazioniRilevate.findIndex(h => h.includes(header.toLowerCase()));
            }
            mappaIndici[header] = index;
        });

        const transaction = db.transaction(['clienti'], 'readwrite');
        const store = transaction.objectStore('clienti');
        let contatoreImportati = 0;
        
        for (let i = 1; i < linee.length; i++) {
            let lineaCorrente = linee[i].trim();
            if (!lineaCorrente) continue;
            
            lineaCorrente = lineaCorrente.replace(/"/g, "");
            const colonne = lineaCorrente.split(";");
            
            let datoEstratto = {};
            HEADERS_CSV.forEach(header => {
                const idx = mappaIndici[header];
                datoEstratto[header] = (idx !== undefined && idx !== -1 && colonne[idx]) ? colonne[idx].trim() : "";
            });
            
            if (!datoEstratto["Cognome"] && !datoEstratto["Nome"] && !datoEstratto["Data di Nascita"]) continue;
            
            let metodoSelezionato = (datoEstratto["Metodo"] || "pitagora").toLowerCase();
            let isPitagora = metodoSelezionato === "pitagora" || metodoSelezionato === "";
            
            let nuovoCliente = {
                cognome: datoEstratto["Cognome"] || "",
                nome: datoEstratto["Nome"] || "",
                data_nascita: datoEstratto["Data di Nascita"] || "",
                metodo: metodoSelezionato,
                data_salvataggio: datoEstratto["Data Salvataggio"] || new Date().toISOString().substring(0, 10)
            };
            
            if (isPitagora) {
                nuovoCliente.anima = datoEstratto["P_Anima"] || ""; 
                nuovoCliente.persona = datoEstratto["P_Persona"] || ""; 
                nuovoCliente.io = datoEstratto["P_Io"] || ""; 
                nuovoCliente.giorno_nascita = datoEstratto["P_GiornoNascita"] || ""; 
                nuovoCliente.destino = datoEstratto["P_Destino"] || ""; 
                nuovoCliente.anno_personale = datoEstratto["P_AnnoPersonale"] || ""; 
                nuovoCliente.giorno_personale = datoEstratto["P_GiornoPersonale"] || ""; 
                nuovoCliente.grandi_cicli = datoEstratto["P_GrandiCicliEvolutivi"] || ""; 
                nuovoCliente.cicli_realizzazione = datoEstratto["P_CicliRealizzazione"] || ""; 
                nuovoCliente.ombre = datoEstratto["P_Ombre"] || ""; 
                nuovoCliente.quintessenza = datoEstratto["P_Quintessenza"] || "";
            } else {
                nuovoCliente.anima = datoEstratto["C_Anima"] || ""; 
                nuovoCliente.persona = datoEstratto["C_Persona"] || ""; 
                nuovoCliente.espressione = datoEstratto["C_Espressione"] || ""; 
                nuovoCliente.numero_psichico = datoEstratto["C_NumeroPsichico"] || ""; 
                nuovoCliente.cammino_vita = datoEstratto["C_CamminoVita"] || ""; 
                nuovoCliente.ciclo_annuale = datoEstratto["C_CicloAnnualeCorrente"] || ""; 
                nuovoCliente.vibrazione_giornaliera = datoEstratto["C_VibrazioneGiornaliera"] || ""; 
                nuovoCliente.afflizioni = datoEstratto["C_AfflizioniPlanetarie"] || "";
            }
            
            store.add(nuovoCliente);
            contatoreImportati++;
        }
        transaction.oncomplete = function() { 
            alert("Importato " + contatoreImportati + " profili."); 
            input.value = ""; 
            mostraClienti(); 
        };
    };
    reader.readAsText(file, "UTF-8");
}
</script>
