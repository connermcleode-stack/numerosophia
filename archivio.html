<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerosophia - Archivio Clienti</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #faf8f5; color: #2c3e50; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { text-align: center; color: #8e7355; margin-bottom: 25px; font-size: 24px; }
        
        /* Layout fluido per barra di ricerca e tasti */
        .actions-bar { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; align-items: center; }
        .search-input { flex-grow: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; box-sizing: border-box; font-family: inherit; transition: border-color 0.2s; width: 100%; }
        .search-input:focus { border-color: #8e7355; outline: none; box-shadow: 0 0 5px rgba(142, 115, 85, 0.2); }

        /* Pulsanti di Esportazione e Importazione */
        .btn-action-container { display: flex; gap: 10px; }
        .btn-export { background-color: #27ae60; color: white; }
        .btn-export:hover { background-color: #219653; }
        .btn-import { background-color: #2980b9; color: white; }
        .btn-import:hover { background-color: #1f6696; }

        /* Contenitore responsivo per far scorrere la tabella su mobile */
        .table-responsive { 
            width: 100%; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            margin-top: 10px;
            background: white;
        }
        
        .table-responsive::-webkit-scrollbar {
            height: 6px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd; white-space: nowrap; }
        
        th { background-color: #f4eee1; color: #8e7355; font-size: 14px; white-space: nowrap; }
        td { font-size: 15px; }
        
        .btn { display: inline-block; padding: 12px 18px; text-decoration: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; white-space: nowrap; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background-color 0.2s; font-family: inherit; }
        .btn-table { padding: 8px 12px; font-size: 14px; border-radius: 4px; }
        .btn-open { background-color: #8e7355; color: white; margin-right: 5px; display: inline-flex; }
        .btn-delete { background-color: #c0392b; color: white; display: inline-flex; }
        .btn-home { background-color: #2c3e50; color: white; margin-bottom: 20px; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 15px; align-self: flex-start; }
        .metodo-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-pitagora { background-color: #d4efdf; color: #196f3d; }
        .badge-caldea { background-color: #ebdef0; color: #6c3483; }

        /* Media Query specifica per Smartphone */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .btn-home { align-self: center; width: 100%; text-align: center; box-sizing: border-box; }
            .actions-bar { flex-direction: column; gap: 12px; }
            .btn-action-container { width: 100%; flex-direction: column; gap: 10px; }
            .btn { width: 100%; padding: 14px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home">← Torna alla Home</a>

    <div class="container">
        <h1>📁 Archivio Profili Numerologici</h1>
        
        <div class="actions-bar">
            <input type="text" id="inputRicerca" onkeyup="filtraClienti()" placeholder="🔍 Cerca per Cognome o Nome..." class="search-input">
            <div class="btn-action-container">
                <button onclick="esportaInExcel()" class="btn btn-export">🟢 Esporta</button>
                <!-- Input nascosto per caricare il file -->
                <input type="file" id="fileImport" accept=".csv" style="display: none;" onchange="importaDaExcel(this)">
                <button onclick="document.getElementById('fileImport').click()" class="btn btn-import">🔵 Importa</button>
            </div>
        </div>

        <div class="table-responsive">
            <table id="tabellaClienti">
                <thead>
                    <tr>
                        <th>Cognome e Nome</th>
                        <th>Data di Nascita</th>
                        <th>Metodo</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="corpoTabella">
                </tbody>
            </table>
        </div>
    </div>

<script>
const DB_NAME = 'NumerologiaDB';
const DB_VERSION = 2; 
let db;

// Apriamo il database comune
const request = indexedDB.open(DB_NAME, DB_VERSION);

request.onupgradeneeded = function(event) {
    const dbIniziale = event.target.result;
    if (!dbIniziale.objectStoreNames.contains('clienti')) {
        dbIniziale.createObjectStore('clienti', { keyPath: 'id', autoIncrement: true });
    }
};

request.onsuccess = function(event) {
    db = event.target.result;
    mostraClienti();
};

request.onerror = function(event) {
    console.error("Errore nell'apertura del database:", event.target.error);
};

function mostraClienti() {
    const corpoTabella = document.getElementById('corpoTabella');
    corpoTabella.innerHTML = ""; 

    const transaction = db.transaction(['clienti'], 'readonly');
    const store = transaction.objectStore('clienti');
    
    const elencoClienti = [];
    
    store.openCursor().onsuccess = function(event) {
        const cursor = event.target.result;
        if (cursor) {
            elencoClienti.push(cursor.value);
            cursor.continue();
        } else {
            if (elencoClienti.length > 0) {
                elencoClienti.sort((a, b) => {
                    let cogA = (a.cognome || "").trim().toUpperCase();
                    let cogB = (b.cognome || "").trim().toUpperCase();
                    if (cogA < cogB) return -1;
                    if (cogA > cogB) return 1;
                    
                    let nomA = (a.nome || "").trim().toUpperCase();
                    let nomB = (b.nome || "").trim().toUpperCase();
                    if (nomA < nomB) return -1;
                    if (nomA > nomB) return 1;
                    return 0;
                });

                elencoClienti.forEach(cliente => {
                    const riga = document.createElement('tr');
                    const fileDestinazione = (cliente.metodo || "").toLowerCase() === 'caldea' ? 'caldea.html' : 'pitagora.html';
                    
                    // Gestione pulita delle stringhe nulle o vuote per i link URL e la visualizzazione
                    const nomeVal = cliente.nome || "";
                    const cognomeVal = cliente.cognome || "";
                    const dataVal = cliente.data_nascita || "";
                    const metodoVal = (cliente.metodo || "pitagora").toLowerCase();

                    const urlMappa = `${fileDestinazione}?nome=${encodeURIComponent(nomeVal)}&cognome=${encodeURIComponent(cognomeVal)}&data=${encodeURIComponent(dataVal)}`;

                 // Visualizzazione nome visualizzato: mostra solo nome/cognome se presenti, altrimenti un trattino
		    let nomeVisualizzato = `${cognomeVal} ${nomeVal}`.trim();
	            if (!nomeVisualizzato) {
    			 nomeVisualizzato = "-";
}

                    riga.innerHTML = `
                        <td><strong>${nomeVisualizzato}</strong></td>
                        <td>${dataVal || "-"}</td>
                        <td><span class="metodo-badge badge-${metodoVal}">${metodoVal}</span></td>
                        <td>
                            <a href="${urlMappa}" class="btn btn-table btn-open">👁️ Apri</a>
                            <button onclick="eliminaCliente(${cliente.id})" class="btn btn-table btn-delete">🗑️ Elimina</button>
                        </td>
                    `;
                    corpoTabella.appendChild(riga);
                });
                
                filtraClienti();
            } else {
                corpoTabella.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">Nessun profilo salvato in archivio.</td></tr>`;
            }
        }
    };
}

function filtraClienti() {
    const input = document.getElementById('inputRicerca');
    const filtro = input.value.toUpperCase();
    const tabella = document.getElementById('corpoTabella');
    const righe = tabella.getElementsByTagName('tr');

    for (let i = 0; i < righe.length; i++) {
        const colonnaNomeCognome = righe[i].getElementsByTagName('td')[0];
        if (colonnaNomeCognome) {
            const testoContenuto = colonnaNomeCognome.textContent || colonnaNomeCognome.innerText;
            if (testoContenuto.toUpperCase().indexOf(filtro) > -1) {
                righe[i].style.display = ""; 
            } else {
                righe[i].style.display = "none"; 
            }
        }
    }
}

// Struttura fissa delle colonne dell'archivio (Unificata per l'interscambio con Excel/Fogli Google)
const HEADERS_CSV = [
    "Cognome", "Nome", "Data di Nascita", "Metodo", "Data Salvataggio",
    "P_Anima", "P_Persona", "P_Io", "P_GiornoNascita", "P_Destino", "P_AnnoPersonale", "P_GiornoPersonale",
    "P_GrandiCicliEvolutivi", "P_CicliRealizzazione", "P_Ombre", "P_Quintessenza",
    "C_Anima", "C_Persona", "C_Espressione", "C_NumeroPsichico", "C_CamminoVita", 
    "C_CicloAnnualeCorrente", "C_VibrazioneGiornaliera", "C_AfflizioniPlanetarie"
];

function esportaInExcel() {
    if (!db) return;

    const transaction = db.transaction(['clienti'], 'readonly');
    const store = transaction.objectStore('clienti');
    const elencoClienti = [];

    store.openCursor().onsuccess = function(event) {
        const cursor = event.target.result;
        if (cursor) {
            elencoClienti.push(cursor.value);
            cursor.continue();
        } else {
            if (elencoClienti.length === 0) {
                alert("Non ci sono profili da esportare.");
                return;
            }

            let csvContent = HEADERS_CSV.join(";") + "\n";

       // Funzione di utilità per pulire i dati ed evitare strutture vuote nel CSV
            const pulisciDato = (valore) => {
                if (valore === undefined || valore === null) return "";
                
                if (typeof valore === 'object') {
                    return JSON.stringify(valore).replace(/;/g, ",").replace(/"/g, "'");
                }
                
                let stringa = String(valore).replace(/;/g, ",").replace(/\r?\n|\r/g, " ").trim();
                
                // Pulisce le strutture vuote dei Grandi Cicli Evolutivi
                if (stringa === "Formativo: | Produttivo: | Conclusivo:") return "";
                
                // Pulisce le strutture vuote dei Cicli di Realizzazione (Pinnacoli)
                if (stringa === "1°: | 2°: | 3°: | 4°:") return "";
                
                // Pulisce le strutture vuote delle Ombre
                if (stringa === "Giovinezza: | Maturità: | Principale:" || stringa === "Giovinezza:  | Maturità:  | Principale: ") return "";
                
                return stringa;
            };

            elencoClienti.forEach(cliente => {
                let rigaDati = [];
                let isPitagora = (cliente.metodo || "").toLowerCase() === "pitagora" || (cliente.metodo || "") === "";

                rigaDati.push(pulisciDato(cliente.cognome));
                rigaDati.push(pulisciDato(cliente.nome));
                rigaDati.push(pulisciDato(cliente.data_nascita));
                rigaDati.push(pulisciDato(cliente.metodo ? cliente.metodo.toLowerCase() : "pitagora"));
                rigaDati.push(cliente.data_salvataggio ? cliente.data_salvataggio.substring(0, 10) : new Date().toISOString().substring(0,10));

                // Campi Pitagora
                rigaDati.push(isPitagora ? pulisciDato(cliente.anima) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.persona) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.io) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.giorno_nascita || cliente.giornoNascita) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.destino) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.anno_personale || cliente.annoPersonale) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.giorno_personale || cliente.giornoPersonale) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.grandi_cicli || cliente.grandiCicli) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.cicli_realizzazione || cliente.cicliRealizzazione) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.ombre) : "");
                rigaDati.push(isPitagora ? pulisciDato(cliente.quintessenza) : "");

                // Campi Caldea
                rigaDati.push(!isPitagora ? pulisciDato(cliente.anima) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.persona) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.espressione) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.numero_psichico || cliente.numeroPsichico) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.cammino_vita || cliente.camminoVita) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.ciclo_annuale || cliente.cicloAnnuale) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.vibrazione_giornaliera || cliente.vibrazioneGiornaliera) : "");
                rigaDati.push(!isPitagora ? pulisciDato(cliente.afflizioni || cliente.afflizioniPlanetarie) : "");

                csvContent += rigaDati.join(";") + "\n";
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Archivio_Completo_Numerosophia.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    };
}

function importaDaExcel(input) {
    if (!db) return;
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        const linee = text.split(/\r?\n/);
        if (linee.length <= 1) {
            alert("Il file caricato sembra essere vuoto o non valido.");
            return;
        }

        // Analizziamo la prima riga delle intestazioni per mappare gli indici delle colonne
        const intestazioniRilevate = linee[0].replace(/^\uFEFF/, "").split(";").map(h => h.trim());
        
        const transaction = db.transaction(['clienti'], 'readwrite');
        const store = transaction.objectStore('clienti');
        let contatoreImportati = 0;

        for (let i = 1; i < linee.length; i++) {
            if (!linee[i].trim()) continue; // Salta le righe vuote di fine file

            const colonne = linee[i].split(";");
            
            // Creiamo una mappa temporanea basata sulle intestazioni reali rilevate nel CSV
            let datoEstratto = {};
            intestazioniRilevate.forEach((intestazione, index) => {
                datoEstratto[intestazione] = colonne[index] ? colonne[index].trim() : "";
            });

            // Se la riga non contiene alcun dato rilevante, la salta
            if (!datoEstratto["Cognome"] && !datoEstratto["Nome"] && !datoEstratto["Data di Nascita"]) {
                continue;
            }

            let metodoSelezionato = (datoEstratto["Metodo"] || "pitagora").toLowerCase();
            let isPitagora = metodoSelezionato === "pitagora";

            // Ricostruiamo l'oggetto del cliente esattamente come l'applicazione si aspetta di trovarlo
            let nuovoCliente = {
                cognome: datoEstratto["Cognome"] || "",
                nome: datoEstratto["Nome"] || "",
                data_nascita: datoEstratto["Data di Nascita"] || "",
                metodo: metodoSelezionato,
                data_salvataggio: datoEstratto["Data Salvataggio"] || new Date().toISOString()
            };

            if (isPitagora) {
                nuovoCliente.anima = datoEstratto["P_Anima"] || "";
                nuovoCliente.persona = datoEstratto["P_Persona"] || "";
                nuovoCliente.io = datoEstratto["P_Io"] || "";
                nuovoCliente.giorno_nascita = datoEstratto["P_GiornoNascita"] || "";
                nuovoCliente.destino = datoEstratto["P_Destino"] || "";
                nuovoCliente.anno_personale = datoEstratto["P_AnnoPersonale"] || "";
                nuovoCliente.giorno_personale = datoEstratto["P_GiornoPersonale"] || "";
                nuovoCliente.grandi_cicli = datoEstratto["P_GrandiCicliEvolutivi"] || "";
                nuovoCliente.cicli_realizzazione = datoEstratto["P_CicliRealizzazione"] || "";
                nuovoCliente.ombre = datoDust = datoEstratto["P_Ombre"] || "";
                nuovoCliente.quintessenza = datoEstratto["P_Quintessenza"] || "";
            } else {
                nuovoCliente.anima = datoEstratto["C_Anima"] || "";
                nuovoCliente.persona = datoEstratto["C_Persona"] || "";
                nuovoCliente.espressione = datoEstratto["C_Espressione"] || "";
                nuovoCliente.numero_psichico = datoEstratto["C_NumeroPsichico"] || "";
                nuovoCliente.cammino_vita = datoEstratto["C_CamminoVita"] || "";
                nuovoCliente.ciclo_annuale = datoEstratto["C_CicloAnnualeCorrente"] || "";
                nuovoCliente.vibrazione_giornaliera = datoEstratto["C_VibrazioneGiornaliera"] || "";
                nuovoCliente.afflizioni = datoEstratto["C_AfflizioniPlanetarie"] || "";
            }

            store.add(nuovoCliente);
            contatoreImportati++;
        }

        transaction.oncomplete = function() {
            alert(`Importazione completata con successo! Recuperati ${contatoreImportati} profili numerologici.`);
            input.value = ""; // Resetta l'input file
            mostraClienti(); // Aggiorna la tabella all'istante
        };

        transaction.onerror = function(event) {
            console.error("Errore durante l'importazione nel database:", event.target.error);
            alert("Si è verificato un errore durante il salvataggio dei dati importati.");
        };
    };

    reader.readAsText(file, "UTF-8");
}

function eliminaCliente(id) {
    if (confirm("Sei sicuro di voler eliminare questo profilo dall'archivio?")) {
        const transaction = db.transaction(['clienti'], 'readwrite');
        const store = transaction.objectStore('clienti');
        const requestDelete = store.delete(id);

        requestDelete.onsuccess = function() {
            alert("Profilo eliminato con successo.");
            mostraClienti(); 
        };
        
        requestDelete.onerror = function(event) {
            console.error("Errore durante l'eliminazione:", event.target.error);
        };
    }
}
</script>
</body>
</html>
