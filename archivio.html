<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerosophia - Archivio Clienti</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #faf8f5; color: #2c3e50; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { text-align: center; color: #8e7355; margin-bottom: 25px; font-size: 24px; }
        
        /* Layout fluido per barra di ricerca e tasto esporta */
        .actions-bar { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .search-input { flex-grow: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; box-sizing: border-box; font-family: inherit; transition: border-color 0.2s; width: 100%; }
        .search-input:focus { border-color: #8e7355; outline: none; box-shadow: 0 0 5px rgba(142, 115, 85, 0.2); }

        /* Contenitore responsivo per far scorrere la tabella su mobile */
        .table-responsive { 
            width: 100%; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            margin-top: 10px;
            background: white;
        }
        
        /* Forza la comparsa della barra di scorrimento sui sistemi che la nascondono */
        .table-responsive::-webkit-scrollbar {
            height: 6px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd; white-space: nowrap; }
        
        /* Rimuoviamo il blocco totale del testo a capo per permettere una gestione fluida delle colonne */
        th { background-color: #f4eee1; color: #8e7355; font-size: 14px; white-space: nowrap; }
        td { font-size: 15px; }
        
        .btn { display: inline-block; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; white-space: nowrap; }
        .btn-open { background-color: #8e7355; color: white; margin-right: 5px; }
        .btn-delete { background-color: #c0392b; color: white; }
        .btn-export { background-color: #27ae60; color: white; font-size: 15px; padding: 12px 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background-color 0.2s; cursor: pointer; font-family: inherit; }
        .btn-export:hover { background-color: #219653; }
        .btn-home { background-color: #2c3e50; color: white; margin-bottom: 20px; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 15px; align-self: flex-start; }
        .metodo-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-pitagora { background-color: #d4efdf; color: #196f3d; }
        .badge-caldea { background-color: #ebdef0; color: #6c3483; }

        /* Media Query specifica per Smartphone */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .btn-home { align-self: center; width: 100%; text-align: center; box-sizing: border-box; }
            .actions-bar { flex-direction: column; gap: 12px; }
            .btn-export { width: 100%; padding: 14px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-home">← Torna alla Home</a>

    <div class="container">
        <h1>📁 Archivio Profili Numerologici</h1>
        
        <div class="actions-bar">
            <input type="text" id="inputRicerca" onkeyup="filtraClienti()" placeholder="🔍 Cerca per Cognome o Nome..." class="search-input">
            <button onclick="esportaInExcel()" class="btn btn-export">🟢 Esporta in Excel</button>
        </div>

        <div class="table-responsive">
            <table id="tabellaClienti">
                <thead>
                    <tr>
                        <th>Cognome e Nome</th>
                        <th>Data di Nascita</th>
                        <th>Metodo</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="corpoTabella">
                </tbody>
            </table>
        </div>
    </div>

<script>
const DB_NAME = 'NumerologiaDB';
const DB_VERSION = 2; 
let db;

// Apriamo il database comune
const request = indexedDB.open(DB_NAME, DB_VERSION);

request.onupgradeneeded = function(event) {
    const dbIniziale = event.target.result;
    if (!dbIniziale.objectStoreNames.contains('clienti')) {
        dbIniziale.createObjectStore('clienti', { keyPath: 'id', autoIncrement: true });
    }
};

request.onsuccess = function(event) {
    db = event.target.result;
    mostraClienti();
};

request.onerror = function(event) {
    console.error("Errore nell'apertura del database:", event.target.error);
};

function mostraClienti() {
    const corpoTabella = document.getElementById('corpoTabella');
    corpoTabella.innerHTML = ""; 

    const transaction = db.transaction(['clienti'], 'readonly');
    const store = transaction.objectStore('clienti');
    
    const elencoClienti = [];
    
    store.openCursor().onsuccess = function(event) {
        const cursor = event.target.result;
        if (cursor) {
            elencoClienti.push(cursor.value);
            cursor.continue();
        } else {
            if (elencoClienti.length > 0) {
                elencoClienti.sort((a, b) => {
                    let cogA = (a.cognome || "").trim().toUpperCase();
                    let cogB = (b.cognome || "").trim().toUpperCase();
                    if (cogA < cogB) return -1;
                    if (cogA > cogB) return 1;
                    
                    let nomA = (a.nome || "").trim().toUpperCase();
                    let nomB = (b.nome || "").trim().toUpperCase();
                    if (nomA < nomB) return -1;
                    if (nomA > nomB) return 1;
                    return 0;
                });

                elencoClienti.forEach(cliente => {
                    const riga = document.createElement('tr');
                    const fileDestinazione = cliente.metodo === 'caldea' ? 'caldea.html' : 'pitagora.html';
                    const urlMappa = `${fileDestinazione}?nome=${encodeURIComponent(cliente.nome)}&cognome=${encodeURIComponent(cliente.cognome)}&data=${encodeURIComponent(cliente.data_nascita)}`;

                    riga.innerHTML = `
                        <td><strong>${cliente.cognome} ${cliente.nome}</strong></td>
                        <td>${cliente.data_nascita}</td>
                        <td><span class="metodo-badge badge-${cliente.metodo}">${cliente.metodo}</span></td>
                        <td>
                            <a href="${urlMappa}" class="btn btn-open">👁️ Apri</a>
                            <button onclick="eliminaCliente(${cliente.id})" class="btn btn-delete">🗑️ Elimina</button>
                        </td>
                    `;
                    corpoTabella.appendChild(riga);
                });
                
                filtraClienti();
            } else {
                corpoTabella.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">Nessun profilo salvato in archivio.</td></tr>`;
            }
        }
    };
}

function filtraClienti() {
    const input = document.getElementById('inputRicerca');
    const filtro = input.value.toUpperCase();
    const tabella = document.getElementById('corpoTabella');
    const righe = tabella.getElementsByTagName('tr');

    for (let i = 0; i < righe.length; i++) {
        const colonnaNomeCognome = righe[i].getElementsByTagName('td')[0];
        if (colonnaNomeCognome) {
            const testoContenuto = colonnaNomeCognome.textContent || colonnaNomeCognome.innerText;
            if (testoContenuto.toUpperCase().indexOf(filtro) > -1) {
                righe[i].style.display = ""; 
            } else {
                righe[i].style.display = "none"; 
            }
        }
    }
}

function esportaInExcel() {
    if (!db) return;

    const transaction = db.transaction(['clienti'], 'readonly');
    const store = transaction.objectStore('clienti');
    const elencoClienti = [];

    store.openCursor().onsuccess = function(event) {
        const cursor = event.target.result;
        if (cursor) {
            elencoClienti.push(cursor.value);
            cursor.continue();
        } else {
            if (elencoClienti.length === 0) {
                alert("Non ci sono profili da esportare.");
                return;
            }

            elencoClienti.sort((a, b) => {
                let cogA = (a.cognome || "").trim().toUpperCase();
                let cogB = (b.cognome || "").trim().toUpperCase();
                if (cogA < cogB) return -1;
                if (cogA > cogB) return 1;
                let nomA = (a.nome || "").trim().toUpperCase();
                let nomB = (b.nome || "").trim().toUpperCase();
                if (nomA < nomB) return -1;
                if (nomA > nomB) return 1;
                return 0;
            });

            let csvContent = "Cognome;Nome;Data di Nascita;Metodo;Data Salvataggio\n";

            elencoClienti.forEach(cliente => {
                let cognome = (cliente.cognome || "").replace(/;/g, ","); 
                let nome = (cliente.nome || "").replace(/;/g, ",");
                let dataNascita = cliente.data_nascita || "";
                let metodo = (cliente.metodo || "").toUpperCase();
                let dataSalvataggio = cliente.data_salvataggio ? cliente.data_salvataggio.substring(0, 10) : "";

                csvContent += `${cognome};${nome};${dataNascita};${metodo};${dataSalvataggio}\n`;
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
            
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Archivio_Numerosophia.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    };
}

function eliminaCliente(id) {
    if (confirm("Sei sicuro di voler eliminare questo profilo dall'archivio?")) {
        const transaction = db.transaction(['clienti'], 'readwrite');
        const store = transaction.objectStore('clienti');
        const requestDelete = store.delete(id);

        requestDelete.onsuccess = function() {
            alert("Profilo eliminato con successo.");
            mostraClienti(); 
        };
        
        requestDelete.onerror = function(event) {
            console.error("Errore durante l'eliminazione:", event.target.error);
        };
    }
}
</script>
</body>
</html>
